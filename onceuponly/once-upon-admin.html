<!DOCTYPE html>
<!--
  Once Upon — Admin Order Dashboard (PROTOTYPE)
  Front-end only. Vanilla HTML/CSS/JS, no build step, no frameworks.
  Sample data + actions are stubbed (console.log) for later wiring into a Next.js app:
    orders API -> table/summary,  Stripe -> payment, Gelato -> fulfillment, Resend -> emails.
  Replace SAMPLE_ORDERS with a fetch() to your /api/orders endpoint, and wire the
  stub functions (resendConfirmationEmail, promoteGelatoDraft, refundOrder, etc.) to API routes.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Once Upon — Admin</title>
<style>
  :root{
    --cream:#FBF4E6; --cream-2:#F4E9D2; --white:#fff;
    --plum:#3A2A5C; --soft:#5A4E6E; --muted:#9B92B3;
    --coral:#E0654E; --coral-dark:#c4452f; --gold:#E8A33D;
    --line:rgba(58,42,92,.10); --shadow:rgba(58,42,92,.12);
    --b-gray:#9B92B3; --b-blue:#4A78C4; --b-amber:#E8A33D; --b-teal:#3FA0A0; --b-green:#5DA271;
    --sans:'Nunito','Segoe UI',system-ui,-apple-system,sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:var(--sans);background:var(--cream);color:var(--plum);line-height:1.5}
  a{color:var(--coral);text-decoration:none}
  a:hover{text-decoration:underline}

  header.topbar{background:var(--white);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:30}
  .topbar-inner{max-width:1280px;margin:0 auto;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px}
  .brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:1.25rem;color:var(--plum)}
  .brand .star{color:var(--gold);font-size:1.3rem}
  .brand small{display:block;font-weight:700;font-size:.7rem;letter-spacing:.12em;color:var(--muted);text-transform:uppercase}
  .topbar .who{font-weight:700;color:var(--soft);font-size:.9rem;display:flex;align-items:center;gap:10px}
  .avatar{width:34px;height:34px;border-radius:50%;background:var(--coral);color:#fff;display:grid;place-items:center;font-weight:800}

  .wrap{max-width:1280px;margin:0 auto;padding:24px}
  h1.page{font-size:1.6rem;margin-bottom:4px}
  p.lede{color:var(--soft);margin-bottom:22px}

  /* summary cards */
  .cards{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;margin-bottom:26px}
  .card{background:var(--white);border-radius:16px;padding:18px 20px;box-shadow:0 6px 20px var(--shadow);border:1px solid var(--line)}
  .card .lbl{font-size:.78rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:7px}
  .card .val{font-size:1.9rem;font-weight:800;margin-top:8px;color:var(--plum)}
  .card .sub{font-size:.8rem;color:var(--soft);margin-top:2px}
  .card.attention{border-color:rgba(224,101,78,.4);background:linear-gradient(180deg,#fff,#fff6f3)}
  .card.attention .val{color:var(--coral)}
  .ic{width:16px;height:16px;display:inline-block;vertical-align:-2px}

  /* toolbar */
  .toolbar{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
  .search{flex:1;min-width:220px;position:relative}
  .search input{width:100%;padding:12px 14px 12px 40px;border:1px solid var(--line);border-radius:999px;background:var(--white);font-family:var(--sans);font-size:.95rem;color:var(--plum)}
  .search input:focus{outline:none;border-color:var(--coral)}
  .search svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted)}
  select.filter{padding:11px 14px;border:1px solid var(--line);border-radius:999px;background:var(--white);font-family:var(--sans);font-weight:700;color:var(--soft);font-size:.9rem;cursor:pointer}
  select.filter:focus{outline:none;border-color:var(--coral)}

  /* table */
  .table-wrap{background:var(--white);border-radius:16px;box-shadow:0 6px 20px var(--shadow);border:1px solid var(--line);overflow:hidden}
  .table-scroll{overflow-x:auto}
  table{width:100%;border-collapse:collapse;min-width:880px}
  thead th{text-align:left;font-size:.74rem;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);font-weight:800;padding:14px 16px;border-bottom:1px solid var(--line);white-space:nowrap;cursor:pointer;user-select:none}
  thead th.nosort{cursor:default}
  thead th .arrow{opacity:.4;font-size:.7rem}
  thead th.sorted .arrow{opacity:1;color:var(--coral)}
  tbody td{padding:14px 16px;border-bottom:1px solid var(--line);font-size:.9rem;color:var(--soft);vertical-align:middle}
  tbody tr{cursor:pointer;transition:background .12s}
  tbody tr:hover{background:var(--cream)}
  tbody tr:last-child td{border-bottom:none}
  .ordno{font-weight:800;color:var(--plum)}
  .cust .nm{font-weight:700;color:var(--plum)}
  .cust .em{font-size:.8rem;color:var(--muted)}
  .book .ti{font-weight:700;color:var(--plum)}
  .book .ch{font-size:.8rem;color:var(--muted)}
  .amt{font-weight:800;color:var(--plum);white-space:nowrap}

  .badge{display:inline-block;padding:4px 11px;border-radius:999px;font-size:.76rem;font-weight:800;letter-spacing:.02em;text-transform:capitalize}
  .badge.pending{background:#efeef3;color:#6b6480}
  .badge.paid{background:#e8f0fb;color:var(--b-blue)}
  .badge.printing{background:#fbf0d9;color:#b9791a}
  .badge.shipped{background:#dff1f1;color:#2c7d7d}
  .badge.fulfilled{background:#e3f3e8;color:#3c7d53}

  .pill-fmt{display:inline-block;padding:3px 10px;border-radius:999px;font-size:.76rem;font-weight:800;background:var(--cream-2);color:var(--soft);text-transform:capitalize}

  .fulfill .g{font-weight:700;color:var(--plum);font-size:.84rem}
  .fulfill .t{font-size:.78rem}
  .fulfill .none{color:var(--muted);font-size:.82rem}
  .dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:6px;vertical-align:1px}

  .empty{padding:46px;text-align:center;color:var(--muted);font-weight:700}

  /* drawer */
  .overlay{position:fixed;inset:0;background:rgba(34,21,56,.4);opacity:0;visibility:hidden;transition:.25s;z-index:40}
  .overlay.open{opacity:1;visibility:visible}
  .drawer{position:fixed;top:0;right:0;height:100%;width:min(520px,100%);background:var(--cream);box-shadow:-10px 0 40px rgba(34,21,56,.25);transform:translateX(100%);transition:transform .3s ease;z-index:50;display:flex;flex-direction:column}
  .drawer.open{transform:translateX(0)}
  .drawer-head{padding:22px 24px;background:var(--white);border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
  .drawer-head h2{font-size:1.3rem}
  .drawer-head .sub{color:var(--soft);font-size:.88rem;margin-top:2px}
  .closex{border:none;background:var(--cream-2);width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:1.1rem;color:var(--soft);flex:none}
  .closex:hover{background:#e7d9bd}
  .drawer-body{padding:24px;overflow-y:auto;flex:1}
  .sec{background:var(--white);border-radius:14px;padding:18px;margin-bottom:16px;border:1px solid var(--line)}
  .sec h3{font-size:.78rem;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
  .kv{display:flex;justify-content:space-between;gap:12px;padding:6px 0;font-size:.9rem}
  .kv .k{color:var(--soft);font-weight:600}
  .kv .v{color:var(--plum);font-weight:700;text-align:right;word-break:break-word}
  .mono{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:.82rem}

  /* timeline */
  .timeline{list-style:none;margin-top:6px}
  .timeline li{position:relative;padding:0 0 18px 26px}
  .timeline li:last-child{padding-bottom:0}
  .timeline li::before{content:"";position:absolute;left:6px;top:18px;bottom:-2px;width:2px;background:var(--line)}
  .timeline li:last-child::before{display:none}
  .tl-dot{position:absolute;left:0;top:3px;width:14px;height:14px;border-radius:50%;background:var(--cream-2);border:2px solid var(--muted)}
  .timeline li.done .tl-dot{background:var(--b-green);border-color:var(--b-green)}
  .timeline li.current .tl-dot{background:var(--coral);border-color:var(--coral);box-shadow:0 0 0 4px rgba(224,101,78,.18)}
  .tl-label{font-weight:800;color:var(--plum);text-transform:capitalize;font-size:.92rem}
  .timeline li.todo .tl-label{color:var(--muted)}
  .tl-time{font-size:.78rem;color:var(--muted)}

  /* actions */
  .actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .btn{border:none;border-radius:999px;padding:12px 14px;font-family:var(--sans);font-weight:800;font-size:.86rem;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:transform .12s,background .15s}
  .btn:hover{transform:translateY(-1px)}
  .btn-primary{background:var(--coral);color:#fff}
  .btn-primary:hover{background:var(--coral-dark)}
  .btn-gold{background:var(--gold);color:var(--plum)}
  .btn-ghost{background:var(--white);color:var(--plum);border:1px solid var(--line)}
  .btn-ghost:hover{border-color:var(--coral);color:var(--coral)}
  .btn-danger{background:#fff;color:var(--coral-dark);border:1px solid rgba(196,69,47,.35)}
  .btn-danger:hover{background:#fff1ee}
  .btn.full{grid-column:1/-1}
  .btn:disabled{opacity:.4;cursor:not-allowed;transform:none}

  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--plum);color:#fff;padding:13px 22px;border-radius:999px;font-weight:700;font-size:.9rem;box-shadow:0 12px 30px rgba(34,21,56,.4);opacity:0;visibility:hidden;transition:.25s;z-index:60}
  .toast.show{opacity:1;visibility:visible;transform:translateX(-50%) translateY(0)}

  @media(max-width:1000px){.cards{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:560px){.cards{grid-template-columns:1fr}.wrap{padding:16px}.actions{grid-template-columns:1fr}}
</style>
</head>
<body>

<header class="topbar">

    <div class="brand"><span class="star">&#10022;</span><div>Once&nbsp;Upon<small>Admin</small></div></div>

  </div>
</header>

<div class="wrap">
  <h1 class="page">Orders</h1>
  <p class="lede">Manage payments, production, and shipping for personalized storybooks.</p>

  <div class="cards" id="cards"></div>

  <div class="toolbar">
    <div class="search">
      <svg class="ic" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="search" type="text" placeholder="Search by order #, email, or name…">
    </div>
    <select class="filter" id="statusFilter">
      <option value="">All statuses</option>
      <option value="pending">Pending</option>
      <option value="paid">Paid</option>
      <option value="printing">Printing</option>
      <option value="shipped">Shipped</option>
      <option value="fulfilled">Fulfilled</option>
    </select>
    <select class="filter" id="formatFilter">
      <option value="">All formats</option>
      <option value="pdf">PDF</option>
      <option value="softcover">Softcover</option>
      <option value="hardcover">Hardcover</option>
    </select>
  </div>

  <div class="table-wrap">
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th data-sort="orderNumber">Order # <span class="arrow">&#8597;</span></th>
            <th data-sort="createdAt">Date <span class="arrow">&#8597;</span></th>
            <th data-sort="customerName">Customer <span class="arrow">&#8597;</span></th>
            <th class="nosort">Book / Child</th>
            <th data-sort="format">Format <span class="arrow">&#8597;</span></th>
            <th data-sort="amountCents">Amount <span class="arrow">&#8597;</span></th>
            <th data-sort="status">Status <span class="arrow">&#8597;</span></th>
            <th class="nosort">Fulfillment</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div class="empty" id="empty" style="display:none">No orders match your filters.</div>
  </div>
</div>

<!-- drawer -->
<div class="overlay" id="overlay" onclick="closeDrawer()"></div>
<aside class="drawer" id="drawer" aria-hidden="true"></aside>

<div class="toast" id="toast"></div>

<script>

    carrier:"", trackingCode:"", trackingUrl:"", shippedAt:"", createdAt:"2026-06-12T14:48:00Z" },

  { orderNumber:"OU-100008", customerEmail:"grace.kim@gmail.com", customerName:"Grace Kim",

    shippingAddress:{name:"",phone:"",line1:"",line2:"",city:"",state:"",postalCode:"",country:""},
    carrier:"", trackingCode:"", trackingUrl:"", shippedAt:"", createdAt:"2026-06-12T08:30:00Z" },

  { orderNumber:"OU-100007", customerEmail:"d.wright@icloud.com", customerName:"Danielle Wright",
    bookTitle:"Noah and the Comet", childName:"Noah", format:"hardcover", amountCents:4900,
    status:"fulfilled", stripeSessionId:"cs_test_B2c3D4e5f6", gelatoOrderId:"gelato_8840551",
    shippingAddress:{name:"Danielle Wright",phone:"+1 469-555-0123",line1:"77 Magnolia St",line2:"",city:"Dallas",state:"TX",postalCode:"75201",country:"US"},
    carrier:"UPS", trackingCode:"1Z999AA10123456784", trackingUrl:"https://www.ups.com/track?tracknum=1Z999AA10123456784", shippedAt:"2026-06-09T16:10:00Z", createdAt:"2026-06-05T13:00:00Z" },

    bookTitle:"Mia in the Whispering Forest", childName:"Mia", format:"softcover", amountCents:3400,
    status:"shipped", stripeSessionId:"cs_test_G7h8I9j0k1", gelatoOrderId:"gelato_8840012",

  { orderNumber:"OU-100005", customerEmail:"hello@bethsmith.com", customerName:"Beth Smith",
    bookTitle:"Oliver and the Lighthouse", childName:"Oliver", format:"pdf", amountCents:1900,
    status:"pending", stripeSessionId:"cs_test_L2m3N4o5p6", gelatoOrderId:"",

    carrier:"", trackingCode:"", trackingUrl:"", shippedAt:"", createdAt:"2026-06-14T19:05:00Z" },

  { orderNumber:"OU-100004", customerEmail:"k.osei@gmail.com", customerName:"Kwame Osei",
    bookTitle:"Kofi and the Golden Drum", childName:"Kofi", format:"hardcover", amountCents:4900,
    status:"printing", stripeSessionId:"cs_test_Q6r7S8t9u0", gelatoOrderId:"gelato_8839870",
    shippingAddress:{name:"Kwame Osei",phone:"+1 281-555-0166",line1:"331 Grand Mission Blvd",line2:"",city:"Richmond",state:"TX",postalCode:"77407",country:"US"},
    carrier:"", trackingCode:"", trackingUrl:"", shippedAt:"", createdAt:"2026-06-11T07:55:00Z" },

  { orderNumber:"OU-100003", customerEmail:"linda.tran@gmail.com", customerName:"Linda Tran",
    bookTitle:"Bella and the Moon Garden", childName:"Bella", format:"softcover", amountCents:3400,
    status:"paid", stripeSessionId:"cs_test_V0w1X2y3z4", gelatoOrderId:"",
    shippingAddress:{name:"Linda Tran",phone:"+1 832-555-0144",line1:"1500 Westheimer Rd",line2:"Apt 9",city:"Houston",state:"TX",postalCode:"77006",country:"US"},
    carrier:"", trackingCode:"", trackingUrl:"", shippedAt:"", createdAt:"2026-06-13T22:18:00Z" },

  { orderNumber:"OU-100002", customerEmail:"mike.r@gmail.com", customerName:"Mike Reynolds",
    bookTitle:"Ethan and the Time Train", childName:"Ethan", format:"pdf", amountCents:1900,
    status:"fulfilled", stripeSessionId:"cs_test_C3d4E5f6g7", gelatoOrderId:"",

    status:"pending", stripeSessionId:"cs_test_H8i9J0k1l2", gelatoOrderId:"",
    shippingAddress:{name:"Sara Ahmed",phone:"+1 469-555-0102",line1:"205 Camelback Ct",line2:"",city:"Plano",state:"TX",postalCode:"75024",country:"US"},
    carrier:"", trackingCode:"", trackingUrl:"", shippedAt:"", createdAt:"2026-06-14T20:47:00Z" },

// ============ STUBBED ACTIONS (wire to API routes later) ============
function resendConfirmationEmail(orderId){ console.log("resendConfirmationEmail", orderId); toast("Confirmation email re-sent (stub)"); }
function resendShipmentEmail(orderId){ console.log("resendShipmentEmail", orderId); toast("Shipment email re-sent (stub)"); }
function promoteGelatoDraft(orderId){ console.log("promoteGelatoDraft", orderId); toast("Gelato draft promoted to production (stub)"); }
function refundOrder(orderId){ console.log("refundOrder", orderId); if(confirm("Issue a full refund for "+orderId+"?")) toast("Refund issued (stub)"); }
function viewPrintPdf(orderId){ console.log("viewPrintPdf", orderId); toast("Opening print PDF (stub)"); }

// ============ STATE ============
const STATUS_ORDER = ["pending","paid","printing","shipped","fulfilled"];
let sortKey="createdAt", sortDir=-1; // newest first
const $=(s)=>document.querySelector(s);
const money=(c)=>"$"+(c/100).toFixed(2);
const fmtDate=(iso)=> iso ? new Date(iso).toLocaleDateString(undefined,{month:"short",day:"numeric",year:"numeric"}) : "—";
const fmtDateTime=(iso)=> iso ? new Date(iso).toLocaleString(undefined,{month:"short",day:"numeric",year:"numeric",hour:"numeric",minute:"2-digit"}) : "—";
const needsAttention=(o)=> o.format!=="pdf" && o.status==="paid" && !o.gelatoOrderId;
const byNum=(o)=>o.orderNumber;

// ============ SUMMARY ============
function renderCards(){
  const all=SAMPLE_ORDERS;
  const paidPlus=all.filter(o=>["paid","printing","shipped","fulfilled"].includes(o.status));
  const revenue=paidPlus.reduce((s,o)=>s+o.amountCents,0);
  const inProd=all.filter(o=>o.status==="printing").length;
  const shipped=all.filter(o=>o.status==="shipped").length;
  const attn=all.filter(needsAttention).length;
  const card=(lbl,val,sub,cls="",icon="")=>`<div class="card ${cls}"><div class="lbl">${icon} ${lbl}</div><div class="val">${val}</div><div class="sub">${sub}</div></div>`;
  $("#cards").innerHTML =
    card("Total orders", all.length, "all time") +
    card("Revenue", money(revenue), "paid &amp; beyond") +
    card("In production", inProd, "printing now") +
    card("Shipped", shipped, "in transit") +
    card("Needs attention", attn, "paid, no Gelato order", attn>0?"attention":"", "&#9888;");
}

// ============ TABLE ============
function getRows(){
  const q=$("#search").value.trim().toLowerCase();
  const sf=$("#statusFilter").value, ff=$("#formatFilter").value;
  let rows=SAMPLE_ORDERS.filter(o=>{
    if(sf && o.status!==sf) return false;
    if(ff && o.format!==ff) return false;
    if(q){ const hay=(o.orderNumber+" "+o.customerEmail+" "+o.customerName).toLowerCase(); if(!hay.includes(q)) return false; }
    return true;
  });
  rows.sort((a,b)=>{
    let av=a[sortKey], bv=b[sortKey];
    if(sortKey==="status"){ av=STATUS_ORDER.indexOf(av); bv=STATUS_ORDER.indexOf(bv); }
    if(sortKey==="amountCents"){ av=+av; bv=+bv; }
    if(av<bv) return -1*sortDir; if(av>bv) return 1*sortDir; return 0;
  });
  return rows;
}
function fulfillCell(o){
  if(o.format==="pdf") return `<span class="none">Digital — no shipping</span>`;
  const dotColor={printing:"var(--b-amber)",shipped:"var(--b-teal)",fulfilled:"var(--b-green)"}[o.status]||"var(--b-gray)";
  const g = o.gelatoOrderId ? `<span class="dot" style="background:${dotColor}"></span><span class="g">${o.gelatoOrderId}</span>` : `<span class="none">No Gelato order yet</span>`;
  const t = o.trackingCode ? `<div class="t"><a href="${o.trackingUrl}" target="_blank" onclick="event.stopPropagation()">${o.carrier} ${o.trackingCode}</a></div>` : "";
  return `<div class="fulfill">${g}${t}</div>`;
}
function renderTable(){
  const rows=getRows();
  const tb=$("#tbody");
  tb.innerHTML = rows.map(o=>`
    <tr onclick='openDrawer("${o.orderNumber}")'>
      <td class="ordno">${o.orderNumber}</td>
      <td>${fmtDate(o.createdAt)}</td>
      <td class="cust"><div class="nm">${o.customerName}</div><div class="em">${o.customerEmail}</div></td>
      <td class="book"><div class="ti">${o.bookTitle}</div><div class="ch">for ${o.childName}</div></td>
      <td><span class="pill-fmt">${o.format}</span></td>
      <td class="amt">${money(o.amountCents)}</td>
      <td><span class="badge ${o.status}">${o.status}</span></td>
      <td>${fulfillCell(o)}</td>
    </tr>`).join("");
  $("#empty").style.display = rows.length ? "none" : "block";
  // sort indicators
  document.querySelectorAll("thead th[data-sort]").forEach(th=>{
    const key=th.getAttribute("data-sort");
    th.classList.toggle("sorted", key===sortKey);
    const arrow=th.querySelector(".arrow");
    if(arrow) arrow.innerHTML = key===sortKey ? (sortDir===1?"&#9650;":"&#9660;") : "&#8597;";
  });
}

// ============ DRAWER ============
function timeline(o){
  const idx=STATUS_ORDER.indexOf(o.status);
  const times={ paid:o.createdAt, shipped:o.shippedAt };
  return `<ul class="timeline">${STATUS_ORDER.map((s,i)=>{
    let cls = i<idx?"done": i===idx?"current":"todo";
    const when = s==="pending"?o.createdAt : times[s] || "";
    return `<li class="${cls}"><span class="tl-dot"></span><div class="tl-label">${s}</div>${when?`<div class="tl-time">${fmtDateTime(when)}</div>`:""}</li>`;
  }).join("")}</ul>`;
}
function addrBlock(a){
  if(!a.line1) return `<div class="kv"><span class="v" style="color:var(--muted);font-weight:600">No shipping address (digital order)</span></div>`;
  return `<div class="kv"><span class="k">Name</span><span class="v">${a.name}</span></div>
    <div class="kv"><span class="k">Phone</span><span class="v">${a.phone||"—"}</span></div>
    <div class="kv"><span class="k">Address</span><span class="v">${[a.line1,a.line2].filter(Boolean).join(", ")}<br>${a.city}, ${a.state} ${a.postalCode}<br>${a.country}</span></div>`;
}
function openDrawer(num){
  const o=SAMPLE_ORDERS.find(x=>x.orderNumber===num); if(!o) return;
  const isPdf=o.format==="pdf";
  const d=$("#drawer");
  d.innerHTML=`
    <div class="drawer-head">
      <div><h2>${o.orderNumber}</h2><div class="sub">${o.bookTitle} &middot; for ${o.childName}</div></div>
      <button class="closex" onclick="closeDrawer()" aria-label="Close">&times;</button>
    </div>
    <div class="drawer-body">
      <div class="sec">
        <h3>Summary</h3>
        <div class="kv"><span class="k">Status</span><span class="v"><span class="badge ${o.status}">${o.status}</span></span></div>
        <div class="kv"><span class="k">Format</span><span class="v"><span class="pill-fmt">${o.format}</span></span></div>
        <div class="kv"><span class="k">Amount</span><span class="v">${money(o.amountCents)}</span></div>
        <div class="kv"><span class="k">Placed</span><span class="v">${fmtDateTime(o.createdAt)}</span></div>
      </div>
      <div class="sec">
        <h3>Customer</h3>
        <div class="kv"><span class="k">Name</span><span class="v">${o.customerName}</span></div>
        <div class="kv"><span class="k">Email</span><span class="v">${o.customerEmail}</span></div>
      </div>
      <div class="sec">
        <h3>Shipping address</h3>
        ${addrBlock(o.shippingAddress)}
      </div>
      <div class="sec">
        <h3>Payment &amp; fulfillment</h3>
        <div class="kv"><span class="k">Stripe session</span><span class="v mono">${o.stripeSessionId||"—"}</span></div>
        <div class="kv"><span class="k">Gelato order</span><span class="v mono">${o.gelatoOrderId|| (isPdf?"— (digital)":"— (not created)")}</span></div>
        <div class="kv"><span class="k">Tracking</span><span class="v">${o.trackingCode?`<a href="${o.trackingUrl}" target="_blank">${o.carrier} ${o.trackingCode}</a>`:"—"}</span></div>
      </div>
      <div class="sec">
        <h3>Timeline</h3>
        ${timeline(o)}
      </div>
      <div class="sec">
        <h3>Actions</h3>
        <div class="actions">
          <button class="btn btn-ghost" onclick="resendConfirmationEmail('${o.orderNumber}')">&#9993; Resend confirmation</button>
          <button class="btn btn-ghost" onclick="resendShipmentEmail('${o.orderNumber}')" ${o.status==="shipped"||o.status==="fulfilled"?"":"disabled"}>&#128230; Resend shipment</button>
          <button class="btn btn-gold" onclick="promoteGelatoDraft('${o.orderNumber}')" ${(!isPdf && o.status==="paid")?"":"disabled"}>&#127981; Promote Gelato draft</button>
          <button class="btn btn-primary" onclick="viewPrintPdf('${o.orderNumber}')">&#128196; View print PDF</button>
          <button class="btn btn-danger full" onclick="refundOrder('${o.orderNumber}')" ${o.status==="pending"?"disabled":""}>&#8617; Issue refund</button>
        </div>
      </div>
    </div>`;
  d.classList.add("open"); d.setAttribute("aria-hidden","false");
  $("#overlay").classList.add("open");
}
function closeDrawer(){ $("#drawer").classList.remove("open"); $("#drawer").setAttribute("aria-hidden","true"); $("#overlay").classList.remove("open"); }
document.addEventListener("keydown",e=>{ if(e.key==="Escape") closeDrawer(); });

// ============ TOAST ============
let toastT;
function toast(msg){ const t=$("#toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("show"),2200); }

// ============ EVENTS ============
$("#search").addEventListener("input", renderTable);
$("#statusFilter").addEventListener("change", renderTable);
$("#formatFilter").addEventListener("change", renderTable);
document.querySelectorAll("thead th[data-sort]").forEach(th=>{
  th.addEventListener("click", ()=>{
    const key=th.getAttribute("data-sort");
    if(key===sortKey){ sortDir*=-1; } else { sortKey=key; sortDir = (key==="createdAt"||key==="amountCents") ? -1 : 1; }
    renderTable();
  });
});

// ============ INIT ============
renderCards();
renderTable();
</script>
</body>
</html>
